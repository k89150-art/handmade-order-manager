<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>手作訂單本｜訂單管理器</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🧵%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=20260706-single-sync1">
</head>
<body>

<header class="top">
  <div class="wrap">
    <div class="brand">
      <span class="mark">🧵</span>
      <h1>手作訂單本</h1>
      <div class="nav-links"><a class="nav-link" href="cost.html">🧮 成本計算器</a></div>
    </div>
    <div class="sub">記錄每一筆手作訂單，從下單到出貨都不漏拍</div>

    <div class="stats" id="stats">
      <!-- filled by JS -->
    </div>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <input type="search" id="searchInput" placeholder="搜尋客人 / 商品 / 布料…">
    <select id="filterPayment">
      <option value="">付款狀態：全部</option>
      <option value="未付款">未付款</option>
      <option value="訂金">訂金</option>
      <option value="已付款">已付款</option>
    </select>
    <select id="filterProduction">
      <option value="">製作狀態：全部</option>
      <option value="未開始">未開始</option>
      <option value="製作中">製作中</option>
      <option value="已完成">已完成</option>
    </select>
    <select id="filterShipping">
      <option value="">出貨狀態：全部</option>
      <option value="未出貨">未出貨</option>
      <option value="已出貨">已出貨</option>
      <option value="面交完成">面交完成</option>
    </select>
    <div class="spacer"></div>
    <button class="btn btn-primary" id="openAddBtn">＋ 新增訂單</button>
  </div>

  <div class="backup-row">
    <span class="hint">資料只存在這個瀏覽器裡，記得定期備份 ↴</span>
    <button class="btn btn-ghost btn-sm" id="exportJsonBtn">匯出備份 (JSON)</button>
    <button class="btn btn-ghost btn-sm" id="importJsonBtn">匯入備份</button>
    <button class="btn btn-ghost btn-sm" id="exportCsvBtn">匯出 CSV</button>
    <input type="file" id="importFileInput" accept="application/json" style="display:none">
  </div>

  <div class="list" id="orderList">
    <!-- filled by JS -->
  </div>

  <div class="footnote">手作訂單本 · 資料保存在此裝置的瀏覽器中，換裝置請先匯出備份再匯入</div>
</div>

<!-- ===================== Modal ===================== -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">新增訂單</h2>
      <button class="modal-close" id="modalCloseBtn" aria-label="關閉">×</button>
    </div>
    <div class="modal-body">
      <form id="orderForm">
        <div class="row2">
          <div class="field">
            <label for="f_date">訂單日期</label>
            <input type="date" id="f_date" required>
          </div>
          <div class="field">
            <label for="f_customer">客人名稱</label>
            <input type="text" id="f_customer" placeholder="例如：陳小姐" required>
          </div>
        </div>

        <div class="section-title">商品品項</div>
        <div id="itemsEditor"><!-- item rows --></div>
        <button type="button" class="add-item-btn" id="addItemBtn">＋ 新增品項</button>

        <div class="total-preview">
          <span class="label">訂單總金額</span>
          <span class="amt" id="totalPreview">NT$ 0</span>
        </div>

        <div class="section-title">狀態</div>
        <div class="row3">
          <div class="field">
            <label for="f_payment">付款狀態</label>
            <select id="f_payment">
              <option value="未付款">未付款</option>
              <option value="訂金">訂金</option>
              <option value="已付款">已付款</option>
            </select>
          </div>
          <div class="field">
            <label for="f_production">製作狀態</label>
            <select id="f_production">
              <option value="未開始">未開始</option>
              <option value="製作中">製作中</option>
              <option value="已完成">已完成</option>
            </select>
          </div>
          <div class="field">
            <label for="f_shipping">出貨狀態</label>
            <select id="f_shipping">
              <option value="未出貨">未出貨</option>
              <option value="已出貨">已出貨</option>
              <option value="面交完成">面交完成</option>
            </select>
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="f_delivery">交貨方式</label>
            <select id="f_delivery">
              <option value="面交">面交</option>
              <option value="郵寄">郵寄</option>
              <option value="超商店到店">超商店到店</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="field">
            <label for="f_note">備註</label>
            <input type="text" id="f_note" placeholder="例如：加布標、不要提繩、指定尺寸">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-danger-ghost" id="deleteOrderBtn" style="display:none;">刪除此訂單</button>
      <div class="spacer"></div>
      <button type="button" class="btn btn-ghost" id="cancelBtn">取消</button>
      <button type="submit" form="orderForm" class="btn btn-primary" id="saveBtn">儲存訂單</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="script.js?v=20260723-migration-marker1"></script>
</body>
</html>

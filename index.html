<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>手作訂單本｜訂單管理器</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🧵%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===================== Design tokens ===================== */
:root{
  --bg: #EFE7D6;
  --bg-alt: #E4D9BF;
  --surface: #FBF7EE;
  --surface-2: #F5EEDD;
  --ink: #2B2A26;
  --ink-soft: #756D5C;
  --ink-faint: #A69C87;
  --indigo: #2C3E5C;
  --indigo-deep: #1D2C42;
  --indigo-tint: #E4E9F0;
  --rust: #B5502E;
  --rust-tint: #F5E3D8;
  --mustard: #B8841C;
  --mustard-tint: #F3E7C9;
  --sage: #4F7A5B;
  --sage-tint: #E1EBE2;
  --line: #D9CDAE;
  --line-strong: #C4B693;
  --shadow: 0 2px 10px rgba(43,42,38,0.07), 0 1px 2px rgba(43,42,38,0.08);
  --shadow-lift: 0 10px 30px rgba(43,42,38,0.16);
  --radius: 14px;
  --font-display: 'Noto Serif TC', serif;
  --font-body: 'Noto Sans TC', -apple-system, 'PingFang TC', system-ui, sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(43,42,38,0.035) 1px, transparent 0);
  background-size: 14px 14px;
  padding-bottom: 60px;
}
a{color:inherit;}
button{font-family:inherit;}
::selection{background: var(--indigo); color:#fff;}

/* focus visibility */
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
  outline: 2px solid var(--indigo);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}

/* ===================== Layout shell ===================== */
.wrap{
  max-width: 900px;
  margin: 0 auto;
  padding: 0 16px;
}

header.top{
  background: linear-gradient(180deg, var(--indigo-deep), var(--indigo));
  color: #F3EFE2;
  padding: 28px 0 34px;
  position: relative;
  overflow: hidden;
}
header.top::after{
  content:"";
  position:absolute; left:0; right:0; bottom:0;
  height: 10px;
  background-image: repeating-linear-gradient(90deg, transparent 0 10px, rgba(243,239,226,0.55) 10px 12px);
  opacity:.5;
}
.brand{
  display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;
}
.brand .mark{ font-size: 26px; line-height:1; }
.brand h1{
  font-family: var(--font-display);
  font-weight:700;
  font-size: 26px;
  margin:0;
  letter-spacing: .02em;
}
.brand .sub{
  font-size:13px;
  color:#C9D2E0;
  margin-top:4px;
  letter-spacing:.04em;
}

.stats{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:10px;
  margin-top:22px;
}
.stat{
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 12px;
  padding: 10px 12px;
}
.stat .num{
  font-family: var(--font-display);
  font-size: 20px;
  font-weight:700;
  font-variant-numeric: tabular-nums;
  line-height:1.2;
}
.stat .label{
  font-size: 11px;
  color:#C9D2E0;
  margin-top:2px;
  letter-spacing:.03em;
}
@media (max-width:640px){
  .stats{grid-template-columns: repeat(2,1fr);}
  .brand h1{font-size:22px;}
}

/* ===================== Toolbar ===================== */
.toolbar{
  margin-top: -22px;
  position: relative;
  z-index: 2;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}
.toolbar input[type="search"]{
  flex: 1 1 180px;
  min-width: 140px;
  padding: 10px 12px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  background: #fff;
  font-size: 14px;
  color: var(--ink);
}
.toolbar select{
  padding: 10px 10px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  background: #fff;
  font-size: 13px;
  color: var(--ink-soft);
}
.btn{
  border:none; cursor:pointer; border-radius: 10px;
  font-weight:600; font-size:14px;
  padding: 10px 16px;
  transition: transform .08s ease, box-shadow .15s ease, background .15s ease;
  white-space: nowrap;
}
.btn:active{ transform: translateY(1px); }
.btn-primary{ background: var(--indigo); color:#fff; }
.btn-primary:hover{ background: var(--indigo-deep); }
.btn-ghost{ background: transparent; color: var(--indigo); border:1px solid var(--line-strong); }
.btn-ghost:hover{ background: var(--indigo-tint); }
.btn-danger-ghost{ background: transparent; color: var(--rust); border:1px solid var(--rust); }
.btn-danger-ghost:hover{ background: var(--rust-tint); }
.btn-sm{ padding: 6px 10px; font-size: 12px; border-radius: 8px; }
.spacer{flex:1 1 auto;}

.backup-row{
  display:flex; gap:8px; justify-content:flex-end; margin-top:10px; flex-wrap:wrap;
}
.backup-row .hint{
  font-size:12px; color: var(--ink-faint); align-self:center; margin-right:auto;
}

/* ===================== Order list ===================== */
.list{
  margin-top: 18px;
  display:flex;
  flex-direction: column;
  gap: 14px;
}
.empty{
  text-align:center;
  padding: 60px 20px;
  color: var(--ink-soft);
  background: var(--surface);
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
}
.empty .mark{font-size:34px; display:block; margin-bottom:10px;}
.empty h3{font-family:var(--font-display); margin: 0 0 6px; color:var(--ink);}

.card{
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  position: relative;
  overflow:hidden;
}
.card::before, .card::after{
  content:"";
  position:absolute; left:16px; right:16px; height:0;
  border-top: 2px dashed var(--line-strong);
  opacity:.7;
}
.card::before{ top:0; }
.card::after{ display:none; }

.card-head{
  display:flex; align-items:flex-start; gap:12px;
  padding: 16px 16px 12px;
}
.swatch{
  width:14px; height:14px; border-radius:50%;
  margin-top:6px; flex:none;
  box-shadow: 0 0 0 3px rgba(0,0,0,0.04) inset;
}
.card-head .who{
  flex:1 1 auto; min-width:0;
}
.card-head .customer{
  font-family: var(--font-display);
  font-weight:700;
  font-size: 17px;
  color: var(--ink);
  margin:0;
  word-break: break-word;
}
.card-head .meta{
  font-size:12.5px;
  color: var(--ink-soft);
  margin-top: 3px;
  display:flex; gap:10px; flex-wrap:wrap;
}
.card-head .total{
  text-align:right;
  flex: none;
}
.card-head .total .amt{
  font-family: var(--font-display);
  font-weight:700; font-size:19px;
  color: var(--indigo-deep);
  font-variant-numeric: tabular-nums;
}
.card-head .total .amt-label{
  font-size: 10.5px; color: var(--ink-faint); letter-spacing:.04em;
}

.items{
  padding: 0 16px 4px;
  display:flex; flex-direction:column; gap:6px;
}
.item-row{
  display:flex; justify-content:space-between; align-items:baseline; gap:10px;
  font-size:13.5px;
  padding: 6px 10px;
  background: var(--surface-2);
  border-radius: 8px;
}
.item-row .name{ font-weight:600; color: var(--ink); }
.item-row .fabric{ color: var(--ink-soft); font-size:12px; }
.item-row .calc{ color: var(--ink-soft); font-variant-numeric: tabular-nums; white-space:nowrap; }

.tags{
  display:flex; flex-wrap:wrap; gap:6px;
  padding: 12px 16px 0;
}
.tag{
  font-size:12px; font-weight:600;
  padding: 4px 10px;
  border-radius: 999px;
  border:1px solid transparent;
  display:inline-flex; align-items:center; gap:5px;
}
.tag .dot{width:6px;height:6px;border-radius:50%;}
.tag.grey{ background:#EEE9DC; color:var(--ink-soft); }
.tag.grey .dot{background:var(--ink-faint);}
.tag.indigo{ background: var(--indigo-tint); color: var(--indigo-deep); }
.tag.indigo .dot{background:var(--indigo);}
.tag.mustard{ background: var(--mustard-tint); color:#7A5A10; }
.tag.mustard .dot{background:var(--mustard);}
.tag.sage{ background: var(--sage-tint); color:#2F5A3C; }
.tag.sage .dot{background:var(--sage);}
.tag.rust{ background: var(--rust-tint); color:#8A3A1F; }
.tag.rust .dot{background:var(--rust);}

.card-foot{
  display:flex; justify-content:space-between; align-items:flex-end; gap:10px;
  padding: 12px 16px 16px;
}
.card-foot .note{
  font-size: 12.5px;
  color: var(--ink-soft);
  flex:1 1 auto;
  min-width:0;
}
.card-foot .note b{color:var(--ink);}
.card-foot .actions{
  display:flex; gap:6px; flex:none;
}

/* ===================== Modal / form ===================== */
.overlay{
  position: fixed; inset:0;
  background: rgba(29,29,26,0.45);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index: 50;
  padding: 0;
}
.overlay.open{ display:flex; }
@media (min-width: 720px){
  .overlay{ align-items:center; padding: 24px; }
}

.modal{
  background: var(--bg);
  width: 100%;
  max-width: 640px;
  max-height: 92vh;
  border-radius: 18px 18px 0 0;
  box-shadow: var(--shadow-lift);
  display:flex; flex-direction:column;
  overflow:hidden;
}
@media (min-width:720px){
  .modal{ border-radius: 18px; max-height:88vh; }
}
.modal-head{
  padding: 18px 20px 14px;
  background: var(--indigo-deep);
  color:#fff;
  display:flex; align-items:center; justify-content:space-between;
}
.modal-head h2{
  font-family: var(--font-display);
  font-size:19px; margin:0; font-weight:700;
}
.modal-close{
  background:transparent; border:none; color:#fff; font-size:20px; cursor:pointer;
  width:32px; height:32px; border-radius:50%; line-height:1;
}
.modal-close:hover{ background: rgba(255,255,255,0.15); }

.modal-body{
  padding: 18px 20px 8px;
  overflow-y:auto;
  flex:1 1 auto;
}
.field{ margin-bottom: 14px; }
.field label{
  display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft);
  margin-bottom:5px; letter-spacing:.02em;
}
.field input, .field select, .field textarea{
  width:100%;
  padding: 10px 12px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  background:#fff;
  font-size: 14.5px;
  color: var(--ink);
  font-family: inherit;
}
.field textarea{ resize:vertical; min-height:56px; }
.row2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
.row3{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; }
@media (max-width:520px){
  .row3{ grid-template-columns: 1fr 1fr; }
}

.section-title{
  font-family: var(--font-display);
  font-size:14px; font-weight:700; color:var(--ink);
  margin: 18px 0 8px;
  display:flex; align-items:center; gap:8px;
}
.section-title::after{
  content:""; flex:1 1 auto; height:1px; background: var(--line-strong);
}

.item-editor{
  background: var(--surface);
  border: 1px dashed var(--line-strong);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  position:relative;
}
.item-editor .item-grid{
  display:grid;
  grid-template-columns: 1.3fr 1fr 0.7fr 0.9fr;
  gap:8px;
}
@media (max-width:560px){
  .item-editor .item-grid{ grid-template-columns: 1fr 1fr; }
}
.item-editor label{
  font-size:11px; color:var(--ink-faint); margin-bottom:3px; display:block;
}
.item-editor input{
  width:100%; padding:8px 9px; border:1px solid var(--line); border-radius:8px; font-size:13.5px; background:#fff;
}
.item-remove{
  position:absolute; top:8px; right:8px;
  background: var(--rust-tint); color:var(--rust);
  border:none; width:24px; height:24px; border-radius:50%;
  font-size:13px; cursor:pointer; line-height:1;
}
.item-remove:hover{ background:var(--rust); color:#fff; }
.item-subtotal{
  text-align:right; font-size:12px; color:var(--ink-soft); margin-top:6px;
  font-variant-numeric: tabular-nums;
}
.add-item-btn{
  width:100%;
  border: 1px dashed var(--indigo);
  background: var(--indigo-tint);
  color: var(--indigo-deep);
  padding: 10px;
  border-radius: 10px;
  font-weight:600;
  cursor:pointer;
  font-size:13.5px;
}
.add-item-btn:hover{ background:#dbe3ee; }

.total-preview{
  display:flex; justify-content:space-between; align-items:center;
  background: var(--indigo-deep); color:#fff;
  padding: 12px 16px; border-radius: 12px; margin: 14px 0 4px;
}
.total-preview .label{ font-size:13px; color:#C9D2E0; }
.total-preview .amt{ font-family:var(--font-display); font-size:22px; font-weight:700; font-variant-numeric: tabular-nums; }

.modal-foot{
  padding: 14px 20px 18px;
  display:flex; gap:10px; justify-content:flex-end;
  border-top: 1px solid var(--line);
  background: var(--bg);
}

/* Toast */
.toast{
  position: fixed; bottom: 20px; left:50%; transform: translateX(-50%) translateY(10px);
  background: var(--ink); color:#fff; padding: 10px 18px; border-radius: 999px;
  font-size: 13.5px; box-shadow: var(--shadow-lift);
  opacity:0; pointer-events:none; transition: opacity .25s, transform .25s;
  z-index: 100;
}
.toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

/* footer note */
.footnote{
  text-align:center; font-size:12px; color:var(--ink-faint); margin-top: 26px;
}
</style>
</head>
<body>

<header class="top">
  <div class="wrap">
    <div class="brand">
      <span class="mark">🧵</span>
      <h1>手作訂單本</h1>
    </div>
    <div class="sub">記錄每一筆手作訂單，從下單到出貨都不漏拍</div>

    <div class="stats" id="stats">
      <!-- filled by JS -->
    </div>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <input type="search" id="searchInput" placeholder="搜尋客人 / 商品 / 布料…">
    <select id="filterPayment">
      <option value="">付款狀態：全部</option>
      <option value="未付款">未付款</option>
      <option value="訂金">訂金</option>
      <option value="已付款">已付款</option>
    </select>
    <select id="filterProduction">
      <option value="">製作狀態：全部</option>
      <option value="未開始">未開始</option>
      <option value="製作中">製作中</option>
      <option value="已完成">已完成</option>
    </select>
    <select id="filterShipping">
      <option value="">出貨狀態：全部</option>
      <option value="未出貨">未出貨</option>
      <option value="已出貨">已出貨</option>
      <option value="面交完成">面交完成</option>
    </select>
    <div class="spacer"></div>
    <button class="btn btn-primary" id="openAddBtn">＋ 新增訂單</button>
  </div>

  <div class="backup-row">
    <span class="hint">資料只存在這個瀏覽器裡，記得定期備份 ↴</span>
    <button class="btn btn-ghost btn-sm" id="exportJsonBtn">匯出備份 (JSON)</button>
    <button class="btn btn-ghost btn-sm" id="importJsonBtn">匯入備份</button>
    <button class="btn btn-ghost btn-sm" id="exportCsvBtn">匯出 CSV</button>
    <input type="file" id="importFileInput" accept="application/json" style="display:none">
  </div>

  <div class="list" id="orderList">
    <!-- filled by JS -->
  </div>

  <div class="footnote">手作訂單本 · 資料保存在此裝置的瀏覽器中，換裝置請先匯出備份再匯入</div>
</div>

<!-- ===================== Modal ===================== -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">新增訂單</h2>
      <button class="modal-close" id="modalCloseBtn" aria-label="關閉">×</button>
    </div>
    <div class="modal-body">
      <form id="orderForm">
        <div class="row2">
          <div class="field">
            <label for="f_date">訂單日期</label>
            <input type="date" id="f_date" required>
          </div>
          <div class="field">
            <label for="f_customer">客人名稱</label>
            <input type="text" id="f_customer" placeholder="例如：陳小姐" required>
          </div>
        </div>

        <div class="section-title">商品品項</div>
        <div id="itemsEditor"><!-- item rows --></div>
        <button type="button" class="add-item-btn" id="addItemBtn">＋ 新增品項</button>

        <div class="total-preview">
          <span class="label">訂單總金額</span>
          <span class="amt" id="totalPreview">NT$ 0</span>
        </div>

        <div class="section-title">狀態</div>
        <div class="row3">
          <div class="field">
            <label for="f_payment">付款狀態</label>
            <select id="f_payment">
              <option value="未付款">未付款</option>
              <option value="訂金">訂金</option>
              <option value="已付款">已付款</option>
            </select>
          </div>
          <div class="field">
            <label for="f_production">製作狀態</label>
            <select id="f_production">
              <option value="未開始">未開始</option>
              <option value="製作中">製作中</option>
              <option value="已完成">已完成</option>
            </select>
          </div>
          <div class="field">
            <label for="f_shipping">出貨狀態</label>
            <select id="f_shipping">
              <option value="未出貨">未出貨</option>
              <option value="已出貨">已出貨</option>
              <option value="面交完成">面交完成</option>
            </select>
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="f_delivery">交貨方式</label>
            <select id="f_delivery">
              <option value="面交">面交</option>
              <option value="郵寄">郵寄</option>
              <option value="超商店到店">超商店到店</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="field">
            <label for="f_note">備註</label>
            <input type="text" id="f_note" placeholder="例如：加布標、不要提繩、指定尺寸">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-danger-ghost" id="deleteOrderBtn" style="display:none;">刪除此訂單</button>
      <div class="spacer"></div>
      <button type="button" class="btn btn-ghost" id="cancelBtn">取消</button>
      <button type="submit" form="orderForm" class="btn btn-primary" id="saveBtn">儲存訂單</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ===================== Storage ===================== */
  var STORAGE_KEY = "handmadeOrders_v1";

  function loadOrders(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){
      console.error("讀取資料失敗", e);
      return [];
    }
  }
  function saveOrders(orders){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
  }

  var state = {
    orders: loadOrders(),
    editingId: null,
    formItems: [] // temp items while editing in modal
  };

  /* ===================== Helpers ===================== */
  function uid(){
    return 'o_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
  }
  function todayStr(){
    var d = new Date();
    var y = d.getFullYear();
    var m = String(d.getMonth()+1).padStart(2,'0');
    var day = String(d.getDate()).padStart(2,'0');
    return y + '-' + m + '-' + day;
  }
  function money(n){
    n = Number(n)||0;
    return 'NT$ ' + n.toLocaleString('zh-TW', {maximumFractionDigits:0});
  }
  function itemsTotal(items){
    return (items||[]).reduce(function(sum, it){
      return sum + (Number(it.qty)||0) * (Number(it.price)||0);
    }, 0);
  }
  function escapeHtml(s){
    return String(s==null?'':s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  // Deterministic swatch color from a text string (fabric / first item name)
  var SWATCH_COLORS = ['#2C3E5C','#B5502E','#B8841C','#4F7A5B','#6B4C6E','#3C6E71','#8A5A2E'];
  function swatchColor(text){
    text = text || '';
    var h = 0;
    for(var i=0;i<text.length;i++){ h = (h*31 + text.charCodeAt(i)) & 0xffffffff; }
    var idx = Math.abs(h) % SWATCH_COLORS.length;
    return SWATCH_COLORS[idx];
  }

  var TAG_CLASS = {
    "未付款":"rust", "訂金":"mustard", "已付款":"sage",
    "未開始":"grey", "製作中":"indigo", "已完成":"sage",
    "未出貨":"grey", "已出貨":"indigo", "面交完成":"sage"
  };

  function toast(msg){
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(function(){ el.classList.remove('show'); }, 2200);
  }

  /* ===================== Stats ===================== */
  function renderStats(){
    var orders = state.orders;
    var pending = orders.filter(function(o){ return o.productionStatus !== '已完成'; }).length;
    var unpaidAmount = orders.reduce(function(sum,o){
      if(o.paymentStatus === '已付款') return sum;
      // 訂金 or 未付款 both count remaining as outstanding (simple: full amount if 未付款, treat 訂金 as still open too)
      return sum + itemsTotal(o.items);
    }, 0);
    var now = new Date();
    var ym = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    var monthOrders = orders.filter(function(o){ return (o.date||'').slice(0,7) === ym; });
    var monthRevenue = monthOrders.reduce(function(sum,o){ return sum + itemsTotal(o.items); }, 0);

    var html = ''
      + statBlock(orders.length, '總訂單數')
      + statBlock(pending, '未完成訂單')
      + statBlock(money(unpaidAmount), '未收款金額')
      + statBlock(money(monthRevenue), '本月營業額');
    document.getElementById('stats').innerHTML = html;
  }
  function statBlock(num, label){
    return '<div class="stat"><div class="num">'+ escapeHtml(num) +'</div><div class="label">'+ escapeHtml(label) +'</div></div>';
  }

  /* ===================== List rendering ===================== */
  function getFilters(){
    return {
      q: document.getElementById('searchInput').value.trim().toLowerCase(),
      payment: document.getElementById('filterPayment').value,
      production: document.getElementById('filterProduction').value,
      shipping: document.getElementById('filterShipping').value
    };
  }

  function matchesFilter(order, f){
    if(f.payment && order.paymentStatus !== f.payment) return false;
    if(f.production && order.productionStatus !== f.production) return false;
    if(f.shipping && order.shippingStatus !== f.shipping) return false;
    if(f.q){
      var hay = [order.customer, order.note].concat(
        (order.items||[]).map(function(it){ return it.name + ' ' + it.fabric; })
      ).join(' ').toLowerCase();
      if(hay.indexOf(f.q) === -1) return false;
    }
    return true;
  }

  function renderList(){
    var f = getFilters();
    var orders = state.orders
      .filter(function(o){ return matchesFilter(o, f); })
      .slice()
      .sort(function(a,b){ return (b.date||'').localeCompare(a.date||'') || (b.createdAt||0) - (a.createdAt||0); });

    var container = document.getElementById('orderList');

    if(orders.length === 0){
      container.innerHTML = '<div class="empty">'
        + '<span class="mark">🧺</span>'
        + '<h3>' + (state.orders.length===0 ? '還沒有任何訂單' : '沒有符合條件的訂單') + '</h3>'
        + '<div>' + (state.orders.length===0 ? '按下「＋ 新增訂單」開始記錄第一筆手作訂單吧' : '換個搜尋字或篩選條件試試看') + '</div>'
        + '</div>';
      return;
    }

    container.innerHTML = orders.map(renderCard).join('');

    // bind actions
    container.querySelectorAll('[data-edit]').forEach(function(btn){
      btn.addEventListener('click', function(){ openForm(btn.getAttribute('data-edit')); });
    });
  }

  function renderCard(order){
    var items = order.items || [];
    var total = itemsTotal(items);
    var firstFabric = items[0] ? (items[0].fabric || items[0].name) : order.customer;
    var color = swatchColor(firstFabric);

    var itemsHtml = items.map(function(it){
      return '<div class="item-row">'
        + '<span class="name">' + escapeHtml(it.name || '未命名商品') + (it.fabric ? '　<span class="fabric">· '+escapeHtml(it.fabric)+'</span>' : '') + '</span>'
        + '<span class="calc">' + (Number(it.qty)||0) + ' × ' + money(it.price) + ' = ' + money((Number(it.qty)||0)*(Number(it.price)||0)) + '</span>'
        + '</div>';
    }).join('');

    var tagsHtml = ''
      + tagHtml(order.paymentStatus)
      + tagHtml(order.productionStatus)
      + tagHtml(order.shippingStatus)
      + '<span class="tag grey"><span class="dot"></span>' + escapeHtml(order.deliveryMethod || '') + '</span>';

    return '<div class="card">'
      + '<div class="card-head">'
        + '<span class="swatch" style="background:'+color+'"></span>'
        + '<div class="who">'
          + '<p class="customer">' + escapeHtml(order.customer || '未命名客人') + '</p>'
          + '<div class="meta"><span>📅 ' + escapeHtml(order.date) + '</span><span>' + items.length + ' 項商品</span></div>'
        + '</div>'
        + '<div class="total"><div class="amt">' + money(total) + '</div><div class="amt-label">訂單總額</div></div>'
      + '</div>'
      + '<div class="items">' + itemsHtml + '</div>'
      + '<div class="tags">' + tagsHtml + '</div>'
      + '<div class="card-foot">'
        + '<div class="note">' + (order.note ? '<b>備註：</b>' + escapeHtml(order.note) : '') + '</div>'
        + '<div class="actions"><button class="btn btn-ghost btn-sm" data-edit="' + order.id + '">編輯</button></div>'
      + '</div>'
      + '</div>';
  }

  function tagHtml(status){
    var cls = TAG_CLASS[status] || 'grey';
    return '<span class="tag ' + cls + '"><span class="dot"></span>' + escapeHtml(status) + '</span>';
  }

  /* ===================== Form / Modal ===================== */
  var overlay = document.getElementById('overlay');

  function openForm(orderId){
    state.editingId = orderId || null;
    var order = orderId ? state.orders.find(function(o){ return o.id === orderId; }) : null;

    document.getElementById('modalTitle').textContent = order ? '編輯訂單' : '新增訂單';
    document.getElementById('deleteOrderBtn').style.display = order ? 'inline-block' : 'none';

    document.getElementById('f_date').value = order ? order.date : todayStr();
    document.getElementById('f_customer').value = order ? order.customer : '';
    document.getElementById('f_payment').value = order ? order.paymentStatus : '未付款';
    document.getElementById('f_production').value = order ? order.productionStatus : '未開始';
    document.getElementById('f_shipping').value = order ? order.shippingStatus : '未出貨';
    document.getElementById('f_delivery').value = order ? order.deliveryMethod : '面交';
    document.getElementById('f_note').value = order ? order.note : '';

    state.formItems = order && order.items && order.items.length
      ? order.items.map(function(it){ return Object.assign({}, it); })
      : [{ id: uid(), name:'', fabric:'', qty:1, price:0 }];

    renderItemsEditor();
    overlay.classList.add('open');
    setTimeout(function(){ document.getElementById('f_customer').focus(); }, 50);
  }

  function closeForm(){
    overlay.classList.remove('open');
    state.editingId = null;
  }

  function renderItemsEditor(){
    var el = document.getElementById('itemsEditor');
    el.innerHTML = state.formItems.map(function(it, idx){
      return itemEditorRow(it, idx);
    }).join('');

    el.querySelectorAll('[data-remove]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var idx = Number(btn.getAttribute('data-remove'));
        if(state.formItems.length <= 1){
          toast('至少要保留一項商品');
          return;
        }
        state.formItems.splice(idx, 1);
        renderItemsEditor();
      });
    });
    el.querySelectorAll('[data-field]').forEach(function(input){
      input.addEventListener('input', function(){
        var idx = Number(input.getAttribute('data-idx'));
        var field = input.getAttribute('data-field');
        var val = input.value;
        state.formItems[idx][field] = (field==='qty' || field==='price') ? Number(val) : val;
        updateSubtotalRow(idx);
        updateTotalPreview();
      });
    });
    updateTotalPreview();
  }

  function itemEditorRow(it, idx){
    return '<div class="item-editor" data-row="'+idx+'">'
      + '<button type="button" class="item-remove" data-remove="'+idx+'" aria-label="刪除品項">×</button>'
      + '<div class="item-grid">'
        + '<div><label>商品名稱</label><input type="text" placeholder="例如：托特包" value="'+escapeHtml(it.name)+'" data-field="name" data-idx="'+idx+'"></div>'
        + '<div><label>布料／款式</label><input type="text" placeholder="例如：藍染帆布" value="'+escapeHtml(it.fabric)+'" data-field="fabric" data-idx="'+idx+'"></div>'
        + '<div><label>數量</label><input type="number" min="0" step="1" value="'+ (it.qty!=null?it.qty:1) +'" data-field="qty" data-idx="'+idx+'"></div>'
        + '<div><label>單價</label><input type="number" min="0" step="1" value="'+ (it.price!=null?it.price:0) +'" data-field="price" data-idx="'+idx+'"></div>'
      + '</div>'
      + '<div class="item-subtotal" id="subtotal_'+idx+'">小計：' + money((Number(it.qty)||0)*(Number(it.price)||0)) + '</div>'
      + '</div>';
  }

  function updateSubtotalRow(idx){
    var it = state.formItems[idx];
    var elS = document.getElementById('subtotal_'+idx);
    if(elS) elS.textContent = '小計：' + money((Number(it.qty)||0)*(Number(it.price)||0));
  }

  function updateTotalPreview(){
    document.getElementById('totalPreview').textContent = money(itemsTotal(state.formItems));
  }

  document.getElementById('addItemBtn').addEventListener('click', function(){
    state.formItems.push({ id: uid(), name:'', fabric:'', qty:1, price:0 });
    renderItemsEditor();
  });

  document.getElementById('orderForm').addEventListener('submit', function(e){
    e.preventDefault();

    var cleanItems = state.formItems
      .map(function(it){
        return { id: it.id || uid(), name: (it.name||'').trim(), fabric:(it.fabric||'').trim(), qty:Number(it.qty)||0, price:Number(it.price)||0 };
      })
      .filter(function(it){ return it.name || it.qty || it.price; });

    if(cleanItems.length === 0){
      toast('請至少填寫一項商品');
      return;
    }

    var data = {
      date: document.getElementById('f_date').value || todayStr(),
      customer: document.getElementById('f_customer').value.trim() || '未命名客人',
      items: cleanItems,
      paymentStatus: document.getElementById('f_payment').value,
      productionStatus: document.getElementById('f_production').value,
      shippingStatus: document.getElementById('f_shipping').value,
      deliveryMethod: document.getElementById('f_delivery').value,
      note: document.getElementById('f_note').value.trim()
    };

    if(state.editingId){
      var existing = state.orders.find(function(o){ return o.id === state.editingId; });
      Object.assign(existing, data);
      existing.updatedAt = Date.now();
      toast('已更新訂單');
    }else{
      data.id = uid();
      data.createdAt = Date.now();
      data.updatedAt = Date.now();
      state.orders.push(data);
      toast('已新增訂單');
    }

    saveOrders(state.orders);
    closeForm();
    renderStats();
    renderList();
  });

  document.getElementById('deleteOrderBtn').addEventListener('click', function(){
    if(!state.editingId) return;
    if(!confirm('確定要刪除這筆訂單嗎？此動作無法復原。')) return;
    state.orders = state.orders.filter(function(o){ return o.id !== state.editingId; });
    saveOrders(state.orders);
    closeForm();
    renderStats();
    renderList();
    toast('已刪除訂單');
  });

  document.getElementById('openAddBtn').addEventListener('click', function(){ openForm(null); });
  document.getElementById('cancelBtn').addEventListener('click', closeForm);
  document.getElementById('modalCloseBtn').addEventListener('click', closeForm);
  overlay.addEventListener('click', function(e){ if(e.target === overlay) closeForm(); });
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape' && overlay.classList.contains('open')) closeForm(); });

  /* ===================== Filters ===================== */
  ['searchInput','filterPayment','filterProduction','filterShipping'].forEach(function(id){
    document.getElementById(id).addEventListener('input', renderList);
    document.getElementById(id).addEventListener('change', renderList);
  });

  /* ===================== Backup: export / import ===================== */
  document.getElementById('exportJsonBtn').addEventListener('click', function(){
    var blob = new Blob([JSON.stringify(state.orders, null, 2)], {type:'application/json'});
    downloadBlob(blob, '手作訂單備份_' + todayStr() + '.json');
    toast('已匯出備份檔');
  });

  document.getElementById('importJsonBtn').addEventListener('click', function(){
    document.getElementById('importFileInput').click();
  });
  document.getElementById('importFileInput').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var data = JSON.parse(reader.result);
        if(!Array.isArray(data)) throw new Error('格式錯誤');
        var mode = confirm('要「取代」目前所有訂單嗎？\n按「確定」＝取代全部\n按「取消」＝合併加入（保留現有訂單）');
        if(mode){
          state.orders = data;
        }else{
          var existingIds = new Set(state.orders.map(function(o){return o.id;}));
          data.forEach(function(o){
            if(!o.id || existingIds.has(o.id)) o.id = uid();
            state.orders.push(o);
          });
        }
        saveOrders(state.orders);
        renderStats();
        renderList();
        toast('匯入完成');
      }catch(err){
        alert('匯入失敗：檔案格式不正確');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  document.getElementById('exportCsvBtn').addEventListener('click', function(){
    var rows = [['訂單日期','客人名稱','商品名稱','布料/款式','數量','單價','小計','訂單總額','付款狀態','製作狀態','出貨狀態','交貨方式','備註']];
    state.orders.forEach(function(o){
      var total = itemsTotal(o.items);
      (o.items||[]).forEach(function(it, idx){
        rows.push([
          o.date, o.customer,
          it.name, it.fabric, it.qty, it.price, (Number(it.qty)||0)*(Number(it.price)||0),
          idx===0 ? total : '',
          idx===0 ? o.paymentStatus : '',
          idx===0 ? o.productionStatus : '',
          idx===0 ? o.shippingStatus : '',
          idx===0 ? o.deliveryMethod : '',
          idx===0 ? o.note : ''
        ]);
      });
    });
    var csv = rows.map(function(r){
      return r.map(function(v){
        v = (v===undefined||v===null) ? '' : String(v);
        if(/[",\n]/.test(v)) v = '"' + v.replace(/"/g,'""') + '"';
        return v;
      }).join(',');
    }).join('\n');
    var blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
    downloadBlob(blob, '手作訂單_' + todayStr() + '.csv');
    toast('已匯出 CSV');
  });

  function downloadBlob(blob, filename){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
  }

  /* ===================== Init ===================== */
  renderStats();
  renderList();
})();
</script>
</body>
</html>

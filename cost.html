<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>手作成本計算器｜手作訂單本</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🧮%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
  <div class="wrap">
    <div class="brand">
      <span class="mark">🧮</span>
      <h1>手作成本計算器</h1>
      <div class="nav-links"><a class="nav-link" href="index.html">🧵 訂單管理器</a></div>
    </div>
    <div class="sub">算清楚材料、工時、雜支，再決定要賣多少錢</div>

    <div class="stats" id="stats">
      <!-- filled by JS -->
    </div>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <input type="search" id="searchInput" placeholder="搜尋商品名稱…">
    <div class="spacer"></div>
    <button class="btn btn-primary" id="openAddBtn">＋ 新增商品成本表</button>
  </div>

  <div class="backup-row">
    <span class="hint">資料只存在這個瀏覽器裡，記得定期備份 ↴</span>
    <button class="btn btn-ghost btn-sm" id="exportJsonBtn">匯出備份 (JSON)</button>
    <button class="btn btn-ghost btn-sm" id="importJsonBtn">匯入備份</button>
    <button class="btn btn-ghost btn-sm" id="exportCsvBtn">匯出 CSV</button>
    <input type="file" id="importFileInput" accept="application/json" style="display:none">
  </div>

  <div class="list" id="sheetList">
    <!-- filled by JS -->
  </div>

  <div class="footnote">手作成本計算器 · 資料保存在此裝置的瀏覽器中，換裝置請先匯出備份再匯入</div>
</div>

<!-- ===================== Modal ===================== -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">新增商品成本表</h2>
      <button class="modal-close" id="modalCloseBtn" aria-label="關閉">×</button>
    </div>
    <div class="modal-body">
      <form id="sheetForm">
        <div class="field">
          <label for="f_name">商品名稱</label>
          <input type="text" id="f_name" placeholder="例如：托特包" required>
        </div>

        <div class="section-title">材料費</div>
        <div id="materialsEditor"><!-- material rows --></div>
        <button type="button" class="add-item-btn" id="addMaterialBtn">＋ 新增材料</button>

        <div class="fabric-calculator">
          <div class="fabric-calc-head">
            <div>
              <h3>布料裁片成本換算</h3>
              <p>用整塊布面積比例估算單件用布成本。</p>
            </div>
            <button type="button" class="btn btn-ghost btn-sm" id="applyFabricCostBtn">帶入材料</button>
          </div>
          <div class="fabric-calc-grid">
            <div class="field">
              <label for="fc_name">材料名稱</label>
              <input type="text" id="fc_name" placeholder="例如：棉布">
            </div>
            <div class="field">
              <label for="fc_totalWidth">整塊布寬</label>
              <input type="number" id="fc_totalWidth" min="0" step="0.1" value="110">
            </div>
            <div class="field">
              <label for="fc_totalHeight">整塊布長</label>
              <input type="number" id="fc_totalHeight" min="0" step="0.1" value="90">
            </div>
            <div class="field">
              <label for="fc_totalPrice">整塊布價格</label>
              <input type="number" id="fc_totalPrice" min="0" step="1" value="350">
            </div>
            <div class="field">
              <label for="fc_pieceWidth">單件用布寬</label>
              <input type="number" id="fc_pieceWidth" min="0" step="0.1" value="64">
            </div>
            <div class="field">
              <label for="fc_pieceHeight">單件用布長</label>
              <input type="number" id="fc_pieceHeight" min="0" step="0.1" value="10">
            </div>
            <div class="field">
              <label for="fc_waste">損耗百分比</label>
              <input type="number" id="fc_waste" min="0" step="1" value="0">
            </div>
          </div>
          <div class="fabric-calc-result">
            <span id="fabricCalcDetail">可估算單件布料成本</span>
            <strong id="fabricCalcOut">NT$ 0</strong>
          </div>
        </div>

        <div class="section-title">工時與其他成本</div>
        <div class="row2">
          <div class="field">
            <label for="f_laborHours">製作工時（小時）</label>
            <input type="number" id="f_laborHours" min="0" step="0.1" value="0">
          </div>
          <div class="field">
            <label for="f_hourlyRate">時薪／每小時工資</label>
            <input type="number" id="f_hourlyRate" min="0" step="1" value="0">
          </div>
        </div>
        <div class="row2">
          <div class="field">
            <label for="f_packaging">包材費（袋子、卡片、緞帶等）</label>
            <input type="number" id="f_packaging" min="0" step="1" value="0">
          </div>
          <div class="field">
            <label for="f_other">其他成本（雜項、損耗等）</label>
            <input type="number" id="f_other" min="0" step="1" value="0">
          </div>
        </div>

        <div class="kv-row total" id="costTotalRow">
          <span class="k">成本總計</span>
          <span class="v" id="costTotalOut">NT$ 0</span>
        </div>

        <div class="section-title">平台／通路手續費（選填）</div>
        <div class="field">
          <label for="f_platformFee">手續費百分比（例如蝦皮、露天，沒有就填 0）</label>
          <input type="number" id="f_platformFee" min="0" max="100" step="0.1" value="0">
        </div>

        <div class="section-title">定價方式：選一個當作主要建議售價，其他也會一起算給你比較</div>
        <div class="compare-table" id="compareTable">
          <!-- 3 rows generated by JS: 加成倍率 / 目標毛利率 / 指定利潤金額 -->
        </div>

        <div class="result-panel" id="resultPanel">
          <!-- filled by JS: 主要建議售價 / 平台費後實收 / 實際利潤 / 實際毛利率 -->
        </div>

        <div class="field" style="margin-top:14px;">
          <label for="f_note">備註</label>
          <input type="text" id="f_note" placeholder="例如：適用尺寸、參考售價來源等">
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-danger-ghost" id="deleteSheetBtn" style="display:none;">刪除此成本表</button>
      <div class="spacer"></div>
      <button type="button" class="btn btn-ghost" id="cancelBtn">取消</button>
      <button type="submit" form="sheetForm" class="btn btn-primary" id="saveBtn">儲存成本表</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="cost.js?v=20260701-sync-layout1"></script>
</body>
</html>
